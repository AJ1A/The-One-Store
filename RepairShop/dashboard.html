<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل الصيانة والزبائن | THE ONE STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0B192C;
            --accent: #FFD700;
            --bg-main: #F8FAFC;
            --text-dark: #1E293B;
            --border: #E2E8F0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background: var(--bg-main); color: var(--text-dark); display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .admin-header {
            width: 100%; background: linear-gradient(135deg, var(--primary) 0%, #1E3E62 100%);
            color: white; padding: 25px 20px; text-align: center; border-bottom: 4px solid var(--accent); margin-bottom: 30px;
        }

        .container {
            width: 95%; max-width: 1200px; background: white; padding: 30px;
            border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 50px;
        }

        .controls {
            display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap;
        }

        .search-box { flex: 1; min-width: 280px; }
        .search-box input {
            width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px;
            font-size: 1rem; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--primary); }

        .refresh-btn {
            background: var(--primary); color: white; border: none; padding: 12px 24px;
            font-weight: 700; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .refresh-btn:hover { background: #1E3E62; }

        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: right; }
        th, td { padding: 14px; border-bottom: 1px solid var(--border); font-size: 0.95rem; vertical-align: middle; }
        th { background-color: #F1F5F9; color: var(--primary); font-weight: 700; white-space: nowrap; }
        tr:hover { background-color: #F8FAFC; }

        /* Interactive Dropdown Styling */
        .status-select {
            padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700;
            border: 2px solid transparent; cursor: pointer; outline: none; transition: 0.3s;
            width: 150px; text-align: center;
        }
        .status-select:focus { border-color: var(--primary); }
        .status-received { background: #FEF3C7; color: #92400E; }
        .status-checking { background: #E0E7FF; color: #3730A3; }
        .status-fixing { background: #FFEDD5; color: #9A3412; }
        .status-ready { background: #DCFCE7; color: #166534; }
        .status-delivered { background: #F1F5F9; color: #475569; text-decoration: line-through; }

        .loader { text-align: center; padding: 40px; font-weight: 600; color: #64748B; }
    </style>
</head>
<body>

    <div class="admin-header">
        <h1>THE ONE STORE</h1>
        <p>سجل بيانات الصيانة والزبائن</p>
    </div>

    <div class="container">
        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث باسم الزبون، رقم الهاتف، أو رقم التذكرة...">
            </div>
            <button class="refresh-btn" onclick="fetchData()">تحديث البيانات 🔄</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>رقم التذكرة</th>
                        <th>التاريخ</th>
                        <th>اسم الزبون</th>
                        <th>رقم الهاتف</th>
                        <th>الجهاز</th>
                        <th>العطل</th>
                        <th>السعر</th>
                        <th>تغيير الحالة</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="8" class="loader">جاري جلب البيانات من السيرفر...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJGYx1AO7g73gQ0G0mPiJ4nH06b84nm_wY6kHMGxgPXxvjVwjtmSdGWx7hs4DloD4b/exec";
        let allData = [];
        const STATUS_OPTIONS = ["تم الاستلام", "جاري الفحص", "قيد التصليح", "جاهز للاستلام", "تم التسليم للزبون"];

        function getStatusClass(status) {
            if (status.includes("الاستلام") && !status.includes("التسليم")) return "status-received";
            if (status.includes("الفحص")) return "status-checking";
            if (status.includes("التصليح")) return "status-fixing";
            if (status.includes("جاهز")) return "status-ready";
            if (status.includes("التسليم")) return "status-delivered";
            return "";
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" class="loader">لا توجد بيانات مطابقة للبحث.</td></tr>`;
                return;
            }

            data.slice().reverse().forEach(row => {
                // Generate options for the select element
                let optionsHtml = "";
                STATUS_OPTIONS.forEach(opt => {
                    const isSelected = (row.status === opt || (opt === "تم التسليم للزبون" && row.status === "تم التسليم")) ? "selected" : "";
                    optionsHtml += `<option value="${opt}" ${isSelected}>${opt}</option>`;
                });

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:bold; color:var(--primary);">${row.id}</td>
                    <td style="font-size:0.85rem; color:#64748B;">${row.date.split(',')[0]}</td>
                    <td style="font-weight:600;">${row.name}</td>
                    <td><a href="tel:${row.phone}" style="text-decoration:none; color:inherit;">${row.phone}</a></td>
                    <td>${row.device}</td>
                    <td style="max-width:200px;">${row.issue}</td>
                    <td style="font-weight:600;">${row.price}</td>
                    <td>
                        <select class="status-select ${getStatusClass(row.status)}" onchange="updateStatus('${row.id}', this)">
                            ${optionsHtml}
                        </select>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateStatus(ticketId, selectElement) {
            const newStatus = selectElement.value;
            
            // Visual feedback: dim dropdown while saving to Sheets
            selectElement.style.opacity = "0.5";
            selectElement.disabled = true;

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: "updateStatus",
                    id: ticketId,
                    status: newStatus
                })
            })
            .then(() => {
                // Update dropdown background color and re-enable
                selectElement.className = `status-select ${getStatusClass(newStatus)}`;
                selectElement.style.opacity = "1";
                selectElement.disabled = false;
                
                // Update local array data
                const targetRow = allData.find(item => item.id === ticketId);
                if (targetRow) targetRow.status = newStatus;
            })
            .catch(err => {
                alert("فشل تحديث الحالة. يرجى التحقق من اتصال الإنترنت.");
                selectElement.style.opacity = "1";
                selectElement.disabled = false;
            });
        }

        function fetchData() {
            document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="loader">جاري جلب البيانات...</td></tr>`;
            
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(response => {
                    if (response.success && response.data) {
                        allData = response.data;
                        renderTable(allData);
                    } else {
                        document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="loader">حدث خطأ في تحميل البيانات.</td></tr>`;
                    }
                })
                .catch(err => {
                    document.getElementById('tableBody').innerHTML = `<tr><td colspan="8" class="loader" style="color:red;">فشل الاتصال بالسيرفر. تأكد من الإنترنت.</td></tr>`;
                });
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            const filtered = allData.filter(item => 
                String(item.name).toLowerCase().includes(query) ||
                String(item.phone).toLowerCase().includes(query) ||
                String(item.id).toLowerCase().includes(query) ||
                String(item.device).toLowerCase().includes(query)
            );
            renderTable(filtered);
        });

        window.onload = fetchData;
    </script>
</body>
</html>
