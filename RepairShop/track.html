<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع حالة الصيانة | THE ONE STORE</title>
    <!-- Premium Arabic Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0B192C;     /* Deep Midnight Navy */
            --accent: #FFD700;      /* Champagne Gold */
            --text-main: #1E293B;   /* Sleek Charcoal */
            --text-muted: #64748B;  /* Slate Gray */
            --bg-light: #F8FAFC;    /* Soft Off-White */
            --card-bg: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Styles */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #1E3E62 100%);
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 20px rgba(11, 25, 44, 0.15);
            border-bottom: 3px solid var(--accent);
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        header p {
            color: var(--accent);
            font-size: 0.9rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* Main Container */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .track-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 650px;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.02);
            position: relative;
        }

        /* Customer Info Block */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #F1F5F9;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 35px;
        }

        .info-item span {
            display: block;
        }

        .info-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            font-weight: 600;
        }

        .info-value {
            font-size: 1.1rem;
            color: var(--primary);
            font-weight: 700;
        }

        /* Premium Stepper Progress Bar */
        .stepper {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin: 40px 0 20px 0;
        }

        /* The background line connecting steps */
        .stepper::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 4px;
            background: #E2E8F0;
            z-index: 1;
        }

        .step {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            text-align: center;
        }

        .step-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #E2E8F0;
            border: 3px solid var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
            transition: all 0.4s ease;
            color: transparent;
            font-size: 0.8rem;
        }

        .step-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            transition: color 0.4s ease;
        }

        /* Active State Styles */
        .step.active .step-icon {
            background: var(--primary);
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 0 4px rgba(255, 215, 0, 0.2);
        }

        .step.active .step-text {
            color: var(--primary);
            font-weight: 700;
        }

        /* Loading Screen Layer */
        .loader-layer {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--card-bg);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #E2E8F0;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer Styles */
        footer {
            background-color: var(--primary);
            color: white;
            text-align: center;
            padding: 25px 20px;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        footer p {
            opacity: 0.8;
            font-weight: 300;
            line-height: 1.6;
        }

        footer .location {
            color: var(--accent);
            font-weight: 600;
            margin-top: 5px;
        }

        @media (max-width: 500px) {
            .info-grid { grid-template-columns: 1fr; gap: 12px; }
            .step-text { font-size: 0.7rem; }
            .step-icon { width: 28px; height: 28px; }
            .stepper::before { top: 12px; }
        }
    </style>
</head>
<body>

<header>
    <h1>THE ONE STORE</h1>
    <p>مركز الصيانة المعتمد</p>
</header>

<div class="main-content">
    <div class="track-card">
        <!-- Elegant Loading State -->
        <div class="loader-layer" id="loader">
            <div class="spinner"></div>
            <p style="color: var(--text-muted); font-size: 0.9rem;">جاري جلب تفاصيل التذكرة...</p>
        </div>

        <!-- Customer Data Grid -->
        <div class="info-grid">
            <div class="info-item">
                <span class="info-label">اسم الزبون</span>
                <span class="info-value" id="u-name">—</span>
            </div>
            <div class="info-item">
                <span class="info-label">الجهاز / الموديل</span>
                <span class="info-value" id="u-device">—</span>
            </div>
        </div>

        <!-- Progress Tracking Stepper -->
        <div class="stepper" id="stepper">
            <div class="step" id="step1">
                <div class="step-icon">✓</div>
                <div class="step-text">تم الاستلام</div>
            </div>
            <div class="step" id="step2">
                <div class="step-icon">✓</div>
                <div class="step-text">جاري الفحص</div>
            </div>
            <div class="step" id="step3">
                <div class="step-icon">✓</div>
                <div class="step-text">قيد التصليح</div>
            </div>
            <div class="step" id="step4">
                <div class="step-icon">✓</div>
                <div class="step-text">جاهز للاستلام</div>
            </div>
            <div class="step" id="step5">
                <div class="step-icon">✓</div>
                <div class="step-text">تم التسليم</div>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>جميع الحقوق محفوظة لـ THE ONE STORE © 2026</p>
    <p class="location">الموقع: الحلة / شارع أربعين - عمارة فلوريس - قرب تقاطع باب الحسين</p>
</footer>

<script>
    // Extract Ticket ID from URL query parameters
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJGYx1AO7g73gQ0G0mPiJ4nH06b84nm_wY6kHMGxgPXxvjVwjtmSdGWx7hs4DloD4b/exec";
    const ticketId = new URLSearchParams(window.location.search).get('id');

    if (ticketId) {
        fetch(`${SCRIPT_URL}?id=${ticketId}`)
        .then(res => res.json())
        .then(data => {
            // Fill Customer UI Data securely
            document.getElementById('u-name').innerText = data.name || "غير متوفر";
            document.getElementById('u-device').innerText = data.device || "غير متوفر";
            
            // Map the text values coming from your Google Sheet Status Column
            const stepsMap = ["تم الاستلام", "جاري الفحص", "قيد التصليح", "جاهز للاستلام", "تم التسليم للزبون"];
            const currentStatusIndex = stepsMap.indexOf(data.status);

            // Light up steps up to the current one
            if (currentStatusIndex !== -1) {
                for (let i = 0; i <= currentStatusIndex; i++) {
                    const stepElement = document.getElementById(`step${i + 1}`);
                    if (stepElement) stepElement.classList.add('active');
                }
            }

            // Hide Premium Loader smoothly
            document.getElementById('loader').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 300);
        })
        .catch(err => {
            console.error("Error fetching data:", err);
            document.querySelector('#loader p').innerText = "خطأ في الاتصال بالسيرفر. يرجى إعادة المحاولة.";
            document.querySelector('.spinner').style.borderTopColor = "#EF4444"; // Red error indicator
        });
    } else {
        document.querySelector('#loader p').innerText = "رقم تذكرة غير صحيح أو مفقود.";
        document.querySelector('.spinner').style.display = "none";
    }
</script>
</body>
</html>
